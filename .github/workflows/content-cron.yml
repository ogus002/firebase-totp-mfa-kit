name: Content automation (weekly suggestion)

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies (no lifecycle scripts)
        working-directory: website
        run: npm install --ignore-scripts

      - name: Generate content suggestion
        working-directory: website
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-content.ts

      - name: Create PR with suggestion
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'content: weekly automation suggestion'
          title: 'content: weekly automation suggestion (cron)'
          body: |
            Weekly content suggestion generated by Claude Sonnet 4.6 against
            `website/pages/firebase-totp-mfa-setup.tsx`.

            See the added file under `website/.content-suggestions/` for the
            full diff suggestion. Review, apply manually if useful, or close
            this PR if not.
          branch: bot/content-cron-${{ github.run_id }}
          base: main
          delete-branch: true
          add-paths: |
            website/.content-suggestions/**
